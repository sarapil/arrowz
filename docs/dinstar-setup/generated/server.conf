# ═══════════════════════════════════════════════════
# Dinstar GSM Gateway — OpenVPN TLS Server Config
# ═══════════════════════════════════════════════════
# Matching the proven working config pattern from old VPS
# Server: 10.10.1.1, Clients: 10.10.1.2+

port 51821
proto udp
dev tun1
dev-type tun

# Subnet topology (proven working with Dinstar)
topology subnet
server 10.10.1.0 255.255.255.0
ifconfig-pool-persist /etc/openvpn/dinstar-tls/ipp.txt

# Allow client IP/port changes behind NAT
float

# PKI
ca   /etc/openvpn/dinstar-tls/pki/ca.crt
cert /etc/openvpn/dinstar-tls/pki/server.crt
key  /etc/openvpn/dinstar-tls/pki/server.key
dh   /etc/openvpn/dinstar-tls/pki/dh2048.pem

# HMAC authentication (tls-auth)
tls-auth /etc/openvpn/dinstar-tls/pki/ta.key 0
tls-version-min 1.0

# Encryption (exact match to old working config)
# compat-mode forces legacy P_DATA_V1 format for OpenVPN 2.3.x clients
compat-mode 2.3.0
cipher AES-256-CBC
auth SHA1
data-ciphers AES-256-CBC
data-ciphers-fallback AES-256-CBC
reneg-sec 0

# Keepalive & notification
keepalive 10 60
explicit-exit-notify 1

# Persist
persist-key
persist-tun

# MTU (proven working with Dinstar)
tun-mtu 1400
mssfix 1360

# Logging
verb 4
log /var/log/openvpn-dinstar-tls.log
status /var/log/openvpn-dinstar-tls-status.log 30
