# Nginx upstream for OpenMeetings reverse proxy
# ===============================================
# 
# Add this to your Nginx config on the VPS host.
# Place in /etc/nginx/conf.d/ or include in server block.
#
# This proxies:
#   https://dev.tavira-group.com/openmeetings → OpenMeetings container

# ---- Add to existing server block for dev.tavira-group.com ----

# OpenMeetings Web UI + API
location /openmeetings {
    proxy_pass         https://127.0.0.1:5443/openmeetings;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    
    # WebSocket support (for OM's internal WS communication)
    proxy_http_version 1.1;
    proxy_set_header   Upgrade $http_upgrade;
    proxy_set_header   Connection "upgrade";
    
    # Timeouts for long-running meeting sessions
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
}
